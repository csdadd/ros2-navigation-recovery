  - [-3.34, -2.36, -1.571, 0]
  - [-3.34, -1.6, -1.571, 2000]
  - [-3.34, -5.36, 0.0, 0]
  - [0.7, -5.36, -1.571, 0]
  - [0.7, -4.36, -1.571, 0]
  - [0.7, -3.36, -1.571, 0]
  - [0.7, -2.36, -1.571, 0]
  - [0.7, -1.6, -1.571, 2000]
  - [0.7, -5.36, -3.142, 0]
  - [-5.34, -5.36, 0.0, 0]
  - [-6.7, -5.36, 0.0, 0]

global_config:
