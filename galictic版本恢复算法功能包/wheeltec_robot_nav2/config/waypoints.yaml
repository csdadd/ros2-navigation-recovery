# 航点配置文件 - 每个航点包含位置、方向和等待时间
# 格式: [x, y, yaw, wait_ms]
#   x: x坐标 (米)
#   y: y坐标 (米)
#   yaw: 朝向角度 (弧度)
#   wait_ms: 在该点等待时间 (毫秒，0表示不等待)

waypoints:
  - [-0.575, 1.941, -1.571, 0]
  - [-0.575, 0.512, -1.571, 0]
  - [-0.721, -1.0, 0.0, 0]
  - [-0.371, -1.0, 0.0, 0]
  - [-1.890, -1.0, 0.0, 2000]
  - [-0.371, -1.0, 0.0, 0]
  - [-0.721, -1.0, 0.0, 0]
  - [-0.575, 0.512, -1.571, 0]
  - [-0.575, 1.941, -1.571, 0]

global_config:
  frame_id: "map"
  action_timeout_sec: 600
