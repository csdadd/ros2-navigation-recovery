controller_manager:
  ros__parameters:
    update_rate: 100
    use_sim_time: true

    robot_joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster
    robot_effort_controller:
      type: effort_controllers/JointGroupEffortController
    robot_ackermann_controller:
      type: ackermann_steering_controller/AckermannSteeringController

robot_effort_controller:
  ros__parameters:
    joints:
        - front_left_wheel_steering_joint
        - front_right_wheel_steering_joint
        - rear_left_wheel_joint
        - rear_right_wheel_joint
    command_interfaces:
        - effort
    state_interfaces:
        - position
        - velocity
        - effort

robot_ackermann_controller:
  ros__parameters:
    # 前轮转向配置
    front_steering: true
    # 前转向关节 (position 控制)
    front_wheels_names: ["front_left_wheel_steering_joint", "front_right_wheel_steering_joint"]
    # 后驱动关节 (velocity 控制)
    rear_wheels_names: ["rear_left_wheel_joint", "rear_right_wheel_joint"]

    # 几何参数
    wheelbase: 0.16
    front_wheel_track: 0.16
    rear_wheel_track: 0.16
    front_wheels_radius: 0.032
    rear_wheels_radius: 0.032

    # 里程计配置
    publish_rate: 100.0
    odom_frame_id: odom
    base_frame_id: base_footprint
    pose_covariance_diagonal: [0.001, 0.001, 0.0, 0.0, 0.0, 0.01]
    twist_covariance_diagonal: [0.001, 0.0, 0.0, 0.0, 0.0, 0.01]

    open_loop: false
    enable_odom_tf: true
    cmd_vel_timeout: 0.5
